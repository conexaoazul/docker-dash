# Grafana dashboard provisioning — auto-imports any .json under
# /etc/grafana/dashboards on boot. Drop additional dashboards there
# (mounted from docker/observability/grafana/dashboards/) and they
# appear in the UI without manual import.
#
# v7.1.0. See: https://grafana.com/docs/grafana/latest/administration/provisioning/#dashboards

apiVersion: 1

providers:
  - name: Docker Dash
    orgId: 1
    folder: Docker Dash
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/dashboards
      foldersFromFilesStructure: false
