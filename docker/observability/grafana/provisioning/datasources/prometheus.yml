# Grafana data source provisioning — auto-configures Prometheus as the
# default data source on first Grafana boot. No manual UI setup needed.
#
# v7.1.0. See: https://grafana.com/docs/grafana/latest/administration/provisioning/#data-sources

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    uid: docker-dash-prom
    isDefault: true
    editable: false
    jsonData:
      timeInterval: 15s
      httpMethod: POST
