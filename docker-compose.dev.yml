# Dev mode — use with: docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  app:
    build:
      context: .
      target: development
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - docker-dash-data:/data
      # Mount source for hot-reload (node --watch)
      - ./src:/app/src:ro
      - ./public:/app/public:ro
    command: ["node", "--watch", "src/server.js"]
    environment:
      - NODE_ENV=development
